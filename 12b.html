    <style>

            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('image_677896.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {

        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

            font-size: 3.5rem;
            color: black;
            -webkit-text-stroke: 0.8px white;

        }

        .gallery {

            gap: 40px;
        }

        .media-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .media-card img, .media-card video {
            width: 100%;
            display: block;
        }
    </style>
</head>
