            display: inline-block;

            font-size: 3.5rem;
            color: black;

        }

        .gallery {

            gap: 40px;
        }

        .media-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .media-card img, .media-card video {
            width: 100%;
            display: block;
        }
