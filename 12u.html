            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('toplusiniflar/ana-arkaplan.jpg');

            background-attachment: fixed;

            transition: 0.3s;

            color: black;
            -webkit-text-stroke: 0.8px white;

        }

        .gallery {
            display: flex;

            gap: 40px;
        }

        .media-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .media-card img {
            width: 100%;
            display: block;
        }
