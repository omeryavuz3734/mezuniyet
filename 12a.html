<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>12-A Sınıf Albümü</title>
    <style>
        body {
            /* Arka plana bayrağı sabitliyoruz ama üzerine siyah bir katman atıyoruz */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('toplusiniflar/ana-arkaplan.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-btn:hover { background: white; color: black; }

        h1 {
            text-align: center;
            font-family: 'Impact', sans-serif;
            font-size: 3.5rem;
            color: black;
            -webkit-text-stroke: 0.8px white;
            margin-bottom: 50px;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 40px; /* Resimler arası boşluk */
        }

        .media-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .media-card img, .media-card video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
