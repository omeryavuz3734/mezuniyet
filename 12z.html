<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>12-Z Sınıf Albümü</title>
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('toplusiniflar/ana-arkaplan.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-btn:hover { background: white; color: black; }

        h1 {
            text-align: center;
            font-family: 'Impact', sans-serif;
            font-size: 3.5rem;
            color: black;
            -webkit-text-stroke: 0.8px white;
            margin-bottom: 50px;
        }

        .gallery {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .media-card {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .media-card img, .media-card video {
            width: 100%;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
    
    <h1>12-Z'nin ANILARI</h1>

    <div class="gallery">
        <!-- Videolar (En Başta) -->
        <div class="media-card"><video controls><source src="12Z/IMG_0734.mp4" type="video/mp4"></video></div>
        <div class="media-card"><video controls><source src="12Z/IMG_0735.mp4" type="video/mp4"></video></div>
        <div class="media-card"><video controls><source src="12Z/IMG_0736.mp4" type="video/mp4"></video></div>
        <div class="media-card"><video controls><source src="12Z/IMG_0737.mp4" type="video/mp4"></video></div>

        <!-- Standart Resimler -->
        <div class="media-card"><img src="12Z/IMG_0739.jpg"></div>
        <div class="media-card"><img src="12Z/IMG_0742.jpg"></div>
        <div class="media-card"><img src="12Z/IMG_0744.jpg"></div>
        <div class="media-card"><img src="12Z/IMG_20260410_113300_031.jpg"></div>

        <!-- WhatsApp ve Diğer Resimler -->
        <div class="media-card"><img src="12Z/IMG-20250620-WA0066.jpg"></div>
        <div class="media-card"><img src="12Z/IMG-20250620-WA0070.jpg"></div>
        <div class="media-card"><img src="12Z/IMG-20260406-WA0031.jpg"></div>
        <div class="media-card"><img src="12Z/IMG-20260423-WA0090.jpg"></div>
        <div class="media-card"><img src="12Z/IMG-20260428-WA0018.jpg"></div>
    </div>
</div>

</body>
</html>
